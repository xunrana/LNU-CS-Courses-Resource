    <script>
        xuanze.sort(function () { return Math.random() - 0.5 })
        panduan.sort(function () { return Math.random() - 0.5 })
        let now = 0

        function pd() {
            document.getElementById('title').innerHTML = '判断题'
            now = 0
            nextPD()
        }
        document.getElementById('title').onclick = pd

        function nextXZ() {
            let question = xuanze[now++]
            if (!question) {
                alert('选择题完成')
                pd()
                return
            }
            let questionDom = document.getElementById('question')
            questionDom.innerHTML = (now) + '. ' + question.question.replace(/\(     \)/g, '(&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;)')
            let choicesDom = document.getElementById('choices')
            choicesDom.innerHTML = ''
            let correct = question.choices[question.answer.charCodeAt() - 65].replace(/>/g, '&gt;').replace(/</g, '&lt;')
            question.choices.sort(function () {
                return Math.random() - 0.5
            })
            for (let i = 0; i < question.choices.length; i++) {
                let choice = document.createElement('div')
                choice.innerHTML = question.choices[i]
                choice.onclick = function () {
                    if (choice.innerHTML == correct) {
                        choice.classList.add('correct')
                        let nextDom = document.createElement('div')
                        nextDom.classList.add('next')
                        nextDom.innerHTML = '下一题'
                        nextDom.onclick = function () {
                            choice.classList.remove('correct')
                            nextXZ()
                        }
                        choicesDom.appendChild(nextDom)
                    } else {
                        choice.classList.add('wrong')
                    }
                }
                choicesDom.appendChild(choice)
            }
        }
        nextXZ()

        function nextPD() {
            // 判断题
            let question = panduan[now++]
            if (!question) {
                alert('完成')
                return
            }
            let questionDom = document.getElementById('question')
            questionDom.innerHTML = (now) + '. ' + question.question;
            let choicesDom = document.getElementById('choices')
            choicesDom.innerHTML = ''
            // 选项只有对和错
            choices = ['对', '错']
            let correct = question.theanswer
            for (let i = 0; i < choices.length; i++) {
                let choice = document.createElement('div')
                choice.innerHTML = choices[i]
                choice.onclick = function () {
                    if (choice.innerHTML == correct) {
                        choice.classList.add('correct')
                        let nextDom = document.createElement('div')
                        nextDom.classList.add('next')
                        nextDom.innerHTML = '下一题'
                        nextDom.onclick = function () {

                            nextPD()
                        }
                        choicesDom.appendChild(nextDom)
                    } else {
                        choice.classList.add('wrong')
                    }
                }
                choicesDom.appendChild(choice)
            }
        }
