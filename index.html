<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="辽宁大学计算机科学与技术专业课程资源库 — 课件 / 笔记 / 实验 / 历年真题">
  <title>LNU CS 资源库</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">页面加载中…</div>
  <script>
    window.$docsify = {
      name: 'LNU CS 资源库',
      repo: 'https://github.com/XUNRANA/LNU-CS-Courses-Resource',
      loadSidebar: true,
      coverpage: true,
      notFoundPage: true,                            // 直接访问不存在路径时显示 _404.md
      relativePath: true,                            // 让学期 README 间的 ../ 相对链接生效
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },  // 所有页面统一用根侧边栏
      maxLevel: 3,
      subMaxLevel: 2,
      sidebarDisplayLevel: 1,                        // 默认折叠各学年组，仅展开当前所在组
      search: {                                      // 全局搜索插件
        placeholder: '🔍 搜索课程 / 资料…',
        noData: '😶 找不到结果',
        depth: 3
      }
    };
    // 课程文件夹/二进制文件没有 .md，站内会 404；把这类正文链接改写为新标签打开 GitHub。
    window.$docsify.plugins = [function (hook) {
      var REPO = 'https://github.com/xunrana/LNU-CS-Courses-Resource';
      function gh(p) { var l = p.split('/').pop(); return REPO + '/' + (/\.[a-z0-9]+$/i.test(l) ? 'blob' : 'tree') + '/main/' + encodeURI(p); }
      hook.doneEach(function () {
        document.querySelectorAll('.markdown-section a').forEach(function (a) {
          var h = a.getAttribute('href') || ''; if (h.indexOf('#/') !== 0) return;         // 仅站内路由链接
          var p = decodeURIComponent(h.slice(2).split('?')[0]).replace(/\/$/, '');
          if (p === '' || /(^|\/)README$/i.test(p) || /\.md$/i.test(p)) return;             // 站内有效页，保留
          a.href = gh(p); a.target = '_blank'; a.rel = 'noopener';                          // 其余 → 跳 GitHub
        });
        var b = document.getElementById('gh-open');                                         // 404 页按钮指向当前尝试路径
        if (b) { var hp = decodeURIComponent(location.hash.slice(2).split('?')[0]).replace(/\/$/, ''); b.href = hp ? gh(hp) : REPO; }
      });
    }].concat(window.$docsify.plugins || []);
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>      <!-- 全局搜索 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>  <!-- 图片放大 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>  <!-- 侧边栏折叠 -->
</body>
</html>
